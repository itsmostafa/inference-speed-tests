version: "3"

tasks:
  format:
    desc: Format main.py with ruff
    cmds:
      - ruff format src/main.py

  typecheck:
    desc: Typecheck main.py with pyright
    cmds:
      - pyright src/main.py

  lint:
    desc: Lint main.py with ruff
    cmds:
      - ruff check src/main.py

  test:
    desc: Run unit tests with pytest
    cmds:
      - uv run pytest src/test_main.py -v

  check:
    desc: Run test, lint, and typecheck in parallel
    deps: [test, lint, typecheck]
